baseURL: https://localhost/
locale: en-us
title: Cluster Zumbi
module:
  imports:
    - path: github.com/imfing/hextra
caches:
  images:
    dir: :cacheDir/images
markup:
  goldmark:
    extensions:
      extensions:
        extras:
          subscript: true
          superscript: true
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['\(', '\)']]
        enable: true
params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/padmec_mini.png
      dark: images/padmec_mini.png
      link: /
      width: 40
      height: 40
