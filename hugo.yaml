baseURL: https://example.org/
locale: en-us
title: My New Hugo Project
module:
  imports:
    - path: github.com/imfing/hextra
markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['\(', '\)']]
        enable: true
