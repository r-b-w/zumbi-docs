baseURL: https://example.org/
locale: en-us
title: Cluster Zumbi
module:
  imports:
    - path: github.com/imfing/hextra
markup:
  goldmark:
    extensions:
      extensions:
        extras:
          subscript: true
          superscript: true
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['\(', '\)']]
        enable: true
